name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM

  virustotal:
    name: VirusTotal Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create archive for scanning
        run: |
          tar -czf skill-package.tar.gz \
            SKILL.md README.md LICENSE \
            scripts/ references/ docs/

      - name: Scan with VirusTotal
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: skill-package.tar.gz
        if: ${{ secrets.VT_API_KEY != '' }}
        continue-on-error: true

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify LICENSE file
        run: |
          [ -f LICENSE ] || { echo "❌ No LICENSE file"; exit 1; }
          grep -qi "MIT" LICENSE || { echo "❌ LICENSE doesn't appear to be MIT"; exit 1; }
          echo "✅ MIT-0 license present"

  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for suspicious patterns
        run: |
          SUSPICIOUS=""

          # Check for eval/exec in scripts
          if grep -rl '\beval\b' scripts/ 2>/dev/null; then
            SUSPICIOUS="$SUSPICIOUS eval() usage found in scripts"
          fi

          # Check for base64 encoded blobs (potential obfuscation)
          if grep -rP '[A-Za-z0-9+/]{100,}={0,2}' scripts/ 2>/dev/null; then
            SUSPICIOUS="$SUSPICIOUS Large base64 blob found"
          fi

          if [ -n "$SUSPICIOUS" ]; then
            echo "⚠️ Review needed: $SUSPICIOUS"
          fi
          echo "✅ Supply chain check passed"
